<!DOCTYPE html>
<html>
<head>
    <title>Police Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1a2e; color: white; padding: 20px; }
        .stat-card { background: #0f3460; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .incident { background: rgba(255,255,255,0.1); padding: 15px; border-left: 4px solid #dc3545; margin-bottom: 10px; border-radius: 8px; }
        .stat-value { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-police-car"></i> Police Command Center</h2>
        
        <div class="row">
            <div class="col-md-3"><div class="stat-card"><h3 id="tourists">0</h3><small>Tourists</small></div></div>
            <div class="col-md-3"><div class="stat-card"><h3 id="incidents">0</h3><small>Incidents</small></div></div>
            <div class="col-md-3"><div class="stat-card"><h3 id="teams">4</h3><small>Teams</small></div></div>
            <div class="col-md-3"><div class="stat-card"><h3 id="time">-</h3><small>Live</small></div></div>
        </div>
        
        <div class="card bg-dark">
            <div class="card-header"><h4><i class="fas fa-fire"></i> Active Incidents</h4></div>
            <div class="card-body" id="incidentList">Loading...</div>
        </div>
        
        <div class="card bg-dark mt-3">
            <div class="card-header bg-danger"><h4><i class="fas fa-bell"></i> Alerts</h4></div>
            <div class="card-body" id="alertList">Monitoring...</div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        async function loadIncidents() {
            const res = await fetch('/api/dashboard/incidents');
            const incidents = await res.json();
            const container = document.getElementById('incidentList');
            if(incidents.length === 0) { container.innerHTML = '<div class="text-muted">No active incidents</div>'; return; }
            container.innerHTML = incidents.map(inc => `
                <div class="incident">
                    <strong>${inc.type}</strong> - <span class="badge bg-danger">${inc.severity}</span><br>
                    Tourist: ${inc.tourist_id}<br>
                    Location: ${inc.location}<br>
                    Time: ${new Date(inc.timestamp).toLocaleTimeString()}<br>
                    <button class="btn btn-sm btn-success mt-2" onclick="resolve('${inc.id}')">Resolve</button>
                </div>
            `).join('');
        }
        
        async function loadStats() {
            const res = await fetch('/api/dashboard/stats');
            const stats = await res.json();
            document.getElementById('tourists').innerHTML = stats.active_tourists;
            document.getElementById('incidents').innerHTML = stats.active_incidents;
        }
        
        async function resolve(id) {
            await fetch(`/api/resolve-incident/${id}`, {method:'POST'});
            loadIncidents();
            loadStats();
            addAlert('Incident resolved');
        }
        
        function addAlert(msg) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = msg + '<button class="btn-close float-end" onclick="this.parentElement.remove()"></button>';
            document.getElementById('alertList').prepend(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }
        
        socket.on('connect', () => addAlert('Connected to command center'));
        socket.on('emergency_alert', (alert) => { addAlert('🚨 EMERGENCY SOS!'); loadIncidents(); loadStats(); });
        socket.on('new_incident', () => { addAlert('⚠️ New incident detected'); loadIncidents(); loadStats(); });
        
        function updateTime() { document.getElementById('time').innerHTML = new Date().toLocaleTimeString(); }
        loadIncidents(); loadStats(); updateTime();
        setInterval(loadIncidents, 10000); setInterval(loadStats, 5000); setInterval(updateTime, 1000);
    </script>
</body>
</html>
